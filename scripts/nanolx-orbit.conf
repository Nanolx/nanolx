# version configuration for
# /usr/sbin/nanolx-orbit

discord_ver=1.0.138
discord_url="https://stable.dl2.discordapp.net/apps/linux/${discord_ver}/discord-${discord_ver}.deb"

zoom_ver=7.0.0.1666
zoom_url="https://zoom.us/client/${zoom_ver}/zoom_amd64.deb"

zoom_vdi_ver=6.6.14.26970
zoom_vdi_url="https://zoom.us/download/vdi/${zoom_vdi_ver}/zoomvdi-universal-plugin-ubuntu_${zoom_vdi_ver%.*}.deb"

jpeg8_ver=8c-2ubuntu12
jpeg8_url="https://archive.ubuntu.com/ubuntu/pool/main/libj/libjpeg8-empty/libjpeg8_${jpeg8_ver}_amd64.deb"
jpeg_turbo8_ver=2.1.5-4ubuntu4
jpeg_turbo8_url="https://archive.ubuntu.com/ubuntu/pool/main/libj/libjpeg-turbo/libjpeg-turbo8_${jpeg_turbo8_ver}_amd64.deb"

# f*ck citrix
citrix_url="https:$(curl -sL \
https://www.citrix.com/downloads/workspace-app/linux/workspace-app-for-linux-latest.html | \
grep "icaclient.*amd64.deb?__gda__" | \
sed -e 's,.*rel=",,;s," id.*,,')"
citrix_pkg="${citrix_url%\?*}"
citrix_pkg="${citrix_pkg##*/}"

citrix_usb_url="https:$(curl -sL \
https://www.citrix.com/downloads/workspace-app/linux/workspace-app-for-linux-latest.html | \
grep "ctxusb.*amd64.deb?__gda__" | \
sed -e 's,.*rel=",,;s," id.*,,')"
citrix_usb_pkg="${citrix_usb_url%\?*}"
citrix_usb_pkg="${citrix_usb_pkg##*/}"

# package_list
package_list="
discord:     ${discord_url##*/}
zoom:        ${zoom_url##*/} (${zoom_ver})
Zoom-vdi:    ${zoom_vdi_url##*/}
jpeg8:       ${jpeg8_url##*/} + ${jpeg_turbo8_url##*/}
citrix:      ${citrix_pkg}
citrix-usb:  ${citrix_usb_pkg}"
